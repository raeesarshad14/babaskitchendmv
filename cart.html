<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart • Baba's Kitchen</title>

    <!-- GLOBAL HEADER + NAV STYLES -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />

    <!-- CART PAGE STYLES -->
    <link rel="stylesheet" href="Cart/cart.css?v=1.0" />
  </head>

  <body>
    <!-- ⭐ TOAST -->
    <div id="toast" class="toast"></div>

    <!-- ⭐ HEADER -->
    <header class="main-header">
      <div class="logo">
        <a href="MainPage.html">
          <img
            src="Pictures/MainPageLogo/logo picture.png"
            alt="BabaKitchen Logo"
          />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html" class="cart-link">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
          <span id="cart-count">0</span>
        </a>
      </div>
    </header>

    <!-- ⭐ CART PAGE -->
    <div class="cart-page">
      <h1>Your Order</h1>

      <div id="cart-items"></div>

      <!-- ⭐ SUMMARY BOX (Subtotal only) -->
 <div class="summary-box">
  <p class="summary-line">Subtotal: $<span id="cart-subtotal">0</span></p>

  <button class="checkout-btn" onclick="window.location.href='checkout.html'">
    Checkout
  </button>
</div>

    

    <script src="Cart/cart.js"></script>

    <script>
      function renderCart() {
        const container = document.getElementById("cart-items");
        container.innerHTML = "";

        if (cart.items.length === 0) {
          container.innerHTML = "<p>Your cart is empty.</p>";
          document.getElementById("cart-subtotal").textContent = "0";
          return;
        }

        cart.items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "cart-row"; // ⭐ FIXED — no more cart-item

          const itemTotal = item.qty * item.price;

          row.innerHTML = `
<div class="cart-top">
  <strong class="item-name">${item.name}</strong><button class="remove-btn" onclick="removeCartItem('${item.name}')">Remove</button>
</div>


            <div class="cart-bottom">
              <div class="qty-section">
                <button class="qty-btn" onclick="changeCartQty('${item.name}', -1)">−</button>
                <span class="qty-number">${item.qty}</span>
                <button class="qty-btn" onclick="changeCartQty('${item.name}', 1)">+</button>
              </div>

              <div class="math-section">
                ${String(item.qty).padStart(2, "0")} × ${item.price} =
                <span class="math-total">$${itemTotal.toFixed(2)}</span>
              </div>
            </div>
          `;

          container.appendChild(row);
        });

        // ⭐ Subtotal only (Total removed)
        const total = cart.getTotal().toFixed(2);
        document.getElementById("cart-subtotal").textContent = total;
      }

      function changeCartQty(name, amount) {
        const item = cart.items.find((i) => i.name === name);
        if (!item) return;

        cart.updateQty(name, item.qty + amount);
        renderCart();
      }

      function removeCartItem(name) {
        cart.removeItem(name);
        renderCart();
      }

      renderCart();
    </script>
  </body>
</html>
