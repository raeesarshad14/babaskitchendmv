<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart • Baba's Kitchen</title>

    <!-- GLOBAL HEADER + NAV STYLES -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />

    <!-- CART PAGE STYLES -->
    <link rel="stylesheet" href="Cart/cart.css" />
  </head>

  <body>
    <!-- ⭐ TOAST -->
    <div id="toast" class="toast"></div>

    <!-- ⭐ HEADER (same as catering page) -->
    <header class="main-header">
      <div class="logo">
        <a href="MainPage.html">
          <img
            src="Pictures/MainPageLogo/logo picture.png"
            alt="BabaKitchen Logo"
          />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="#">DESSERTS</a>
        <a href="#">WEEKLY MENU</a>
        <a href="#">CONTACT</a>
        <a href="#">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
        </a>
        <span id="cart-count">0</span>
      </div>
    </header>

    <!-- ⭐ CART PAGE -->
    <div class="cart-page">
      <h1>Your Cart</h1>

      <div id="cart-items"></div>

      <div class="cart-total">Total: $<span id="cart-total">0</span></div>
    </div>

    <!-- CART LOGIC -->
    <script src="Cart/cart.js"></script>

    <script>
      function renderCart() {
        const container = document.getElementById("cart-items");
        container.innerHTML = "";

        if (cart.items.length === 0) {
          container.innerHTML = "<p>Your cart is empty.</p>";
          document.getElementById("cart-total").textContent = "0";
          return;
        }

        cart.items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "cart-item";

          row.innerHTML = `
            <div class="cart-left">
              ${item.image ? `<img src="${item.image}" class="cart-img" />` : ""}
              <div>
                <strong>${item.name}</strong>
                <p>$${item.price}</p>
              </div>
            </div>

            <div class="cart-controls">
              <button class="qty-btn" onclick="changeCartQty('${item.name}', -1)">−</button>
              <span>${item.qty}</span>
              <button class="qty-btn" onclick="changeCartQty('${item.name}', 1)">+</button>

              <button class="remove-btn" onclick="removeCartItem('${item.name}')">🗑</button>
            </div>
          `;

          container.appendChild(row);
        });

        document.getElementById("cart-total").textContent = cart.getTotal();
      }

      function changeCartQty(name, amount) {
        const item = cart.items.find((i) => i.name === name);
        if (!item) return;

        cart.updateQty(name, item.qty + amount);
        renderCart();
      }

      function removeCartItem(name) {
        cart.removeItem(name);
        renderCart();
      }

      renderCart();
    </script>
  </body>
</html>
