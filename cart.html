<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart • Baba's Kitchen</title>

    <link rel="stylesheet" href="MainPage/MainPage.css" />
    <link rel="stylesheet" href="Cart/cart.css?v=1.0" />
  </head>

  <!-- ⭐ ADD THIS CLASS -->
  <body class="cart-page-body">
    <div id="toast" class="toast"></div>

    <!-- DESKTOP HEADER -->
    <header class="main-header">
      <div class="logo">
        <a href="index.html">
          <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html" class="cart-link">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
          <span id="cart-count">0</span>
        </a>
      </div>
    </header>

    <!-- ⭐ MOBILE HEADER (CART ONLY) -->
    <div class="mobile-header-cart">
      <div class="mobile-header-top-cart">
        <div class="mobile-logo-cart">
          <a href="index.html">
            <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
          </a>
        </div>

        <div class="mobile-cart-icon-cart">
          <a href="cart.html">
            <img src="Pictures/cartpicture/cart.png" alt="Cart" />
            <span id="cart-count-mobile-cart">0</span>
          </a>
        </div>
      </div>

      <div class="mobile-menu-btn-cart">MENU ☰</div>

      <div class="mobile-dropdown-cart">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </div>
    </div>

    <!-- CART PAGE -->
    <div class="cart-page">
      <h1>Your Order</h1>
      <div id="cart-items"></div>

      <div class="summary-box">
        <p class="summary-line">Subtotal: $<span id="cart-subtotal">0</span></p>
        <button
          class="checkout-btn"
          onclick="window.location.href = 'checkout.html'"
        >
          Checkout
        </button>
      </div>
    </div>

    <script src="Cart/cart.js"></script>

    <script>
      function renderCart() {
        const container = document.getElementById("cart-items");
        container.innerHTML = "";

        if (cart.items.length === 0) {
          container.innerHTML = "<p>Your cart is empty.</p>";
          document.getElementById("cart-subtotal").textContent = "0";
          return;
        }

        cart.items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "cart-row";

          const itemTotal = item.qty * item.price;

          row.innerHTML = `
            <div class="cart-left">
              <button class="remove-btn" onclick="removeCartItem('${item.name}')">Remove</button>
              <span class="item-name">${item.name}</span>
            </div>

            <div class="qty-section">
              <button class="qty-btn" onclick="changeCartQty('${item.name}', -1)">−</button>
              <span class="qty-number">${item.qty}</span>
              <button class="qty-btn" onclick="changeCartQty('${item.name}', 1)">+</button>
            </div>

            <div class="math-section">
              $${itemTotal.toFixed(2)}
            </div>
          `;

          container.appendChild(row);
        });

        document.getElementById("cart-subtotal").textContent = cart
          .getTotal()
          .toFixed(2);

        const mobileBadge = document.getElementById("cart-count-mobile-cart");
        if (mobileBadge) mobileBadge.textContent = cart.getCount();
      }

      function changeCartQty(name, amount) {
        const item = cart.items.find((i) => i.name === name);
        if (!item) return;

        cart.updateQty(name, item.qty + amount);
        renderCart();
      }

      function removeCartItem(name) {
        cart.removeItem(name);
        renderCart();
      }

      renderCart();
    </script>

    <!-- MOBILE MENU JS -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector(".mobile-menu-btn-cart");
        const drop = document.querySelector(".mobile-dropdown-cart");

        if (btn && drop) {
          btn.addEventListener("click", () => {
            drop.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
