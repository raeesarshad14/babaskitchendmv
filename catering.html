<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Catering • Baba's Kitchen</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />

    <!-- CATERING PAGE STYLE -->
    <link rel="stylesheet" href="Catering/catering.css" />

    <!-- SIDEBAR STYLE -->
    <link rel="stylesheet" href="Catering/cateringsidebar.css" />

    <!-- CATERING MODAL STYLE -->
    <link rel="stylesheet" href="Catering/cateringModal.css" />

    <!-- CART SYSTEM STYLES -->
    <link rel="stylesheet" href="Cart/cart.css" />
  </head>

  <body class="catering-page-body">
    <!-- ⭐ BACK TO TOP BUTTON -->
    <div id="backToTop" class="back-to-top">↑</div>

    <!-- ⭐ FLOATING JUMP MENU BUTTON -->
    <div id="jumpMenuBtn" class="jump-menu-btn">☰ Categories</div>

    <!-- ⭐ FLOATING JUMP MENU PANEL -->
    <div id="jumpMenuPanel" class="jump-menu-panel"></div>

    <!-- ⭐ TOAST -->
    <div id="toast" class="toast"></div>

    <!-- DESKTOP HEADER -->
    <header class="main-header">
      <div class="logo">
        <a href="index.html">
          <img
            src="Pictures/MainPageLogo/logo picture.png"
            alt="BabaKitchen Logo"
          />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon" onclick="window.location.href = 'cart.html'">
        <img src="Pictures/cartpicture/cart.png" alt="Cart" />
        <span id="cart-count">0</span>
      </div>
    </header>

    <!-- ⭐ MOBILE HEADER -->
    <div class="mobile-header-catering">
      <div class="mobile-header-top-catering">
        <div class="mobile-logo-catering">
          <a href="index.html">
            <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
          </a>
        </div>

        <div class="mobile-cart-icon-catering">
          <a href="cart.html">
            <img src="Pictures/cartpicture/cart.png" alt="Cart" />
            <span id="cart-count-mobile-catering">0</span>
          </a>
        </div>
      </div>

      <div class="mobile-menu-btn-catering">MENU ☰</div>

      <div class="mobile-dropdown-catering">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </div>
    </div>

    <!-- PAGE WRAPPER -->
    <div class="catering-page-wrapper">
      <div class="catering-layout">
        <div id="sidebar-container"></div>
        <div id="catering-container"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="cateringModalOverlay" class="catering-modal-overlay">
      <div class="catering-modal">
        <h2 id="modalItemName"></h2>

        <!-- SMALL TRAY -->
        <div id="smallTrayRow" class="qty-row" style="display: none">
          <span>Small Tray ($<span id="smallPriceUnit"></span>)</span>
          <button class="qty-btn" onclick="changeQty('small', -1)">−</button>
          <span id="smallQty">0</span>
          <button class="qty-btn" onclick="changeQty('small', 1)">+</button>
          <span id="smallTotal">$0</span>
        </div>

        <!-- LARGE TRAY -->
        <div id="largeTrayRow" class="qty-row" style="display: none">
          <span>Large Tray ($<span id="largePriceUnit"></span>)</span>
          <button class="qty-btn" onclick="changeQty('large', -1)">−</button>
          <span id="largeQty">0</span>
          <button class="qty-btn" onclick="changeQty('large', 1)">+</button>
          <span id="largeTotal">$0</span>
        </div>

        <!-- SINGLE PRICE -->
        <div id="singleRow" class="qty-row" style="display: none">
          <button class="qty-btn" onclick="changeQty('single', -1)">−</button>
          <span id="singleQty">12</span>
          <button class="qty-btn" onclick="changeQty('single', 1)">+</button>
          <span id="singleTotal">$0</span>
        </div>

        <p class="total-label">Subtotal: <span id="modalSubtotal">$0</span></p>

        <div class="modal-buttons">
          <button id="modalAddBtn" class="add-btn">Add to Cart</button>
          <button onclick="closeModal()" class="close-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- JS FILES -->
    <script src="Catering/cateringsidebar.js"></script>
    <script src="Catering/cateringModal.js"></script>
    <script src="Catering/catering.js"></script>

    <!-- CART LOGIC -->
    <script src="Cart/cart.js" defer></script>

    <!-- ⭐ MOBILE MENU JS -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector(".mobile-menu-btn-catering");
        const drop = document.querySelector(".mobile-dropdown-catering");

        if (btn && drop) {
          btn.addEventListener("click", () => {
            drop.classList.toggle("active");
          });
        }

        const mobileBadge = document.getElementById(
          "cart-count-mobile-catering",
        );
        if (mobileBadge && typeof cart !== "undefined") {
          mobileBadge.textContent = cart.getCount();
        }
      });
    </script>

    <!-- ⭐ LOAD CATERING CONTENT -->
    <script>
      const cateringPage = new CateringPage();
      cateringPage.render().then((html) => {
        document.getElementById("catering-container").innerHTML = html;

        fetch("cateringsidebar.html")
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("sidebar-container").innerHTML = html;
            initSidebarScroll();
          });

        // ⭐ Initialize Jump Menu after content loads
        setTimeout(initJumpMenu, 300);
      });
    </script>

    <!-- ⭐ BACK TO TOP JS -->
    <script>
      const backToTop = document.getElementById("backToTop");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 400) {
          backToTop.classList.add("show");
        } else {
          backToTop.classList.remove("show");
        }
      });

      backToTop.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>

    <!-- ⭐ JUMP MENU JS -->
    <script>
      function initJumpMenu() {
        const panel = document.getElementById("jumpMenuPanel");
        const btn = document.getElementById("jumpMenuBtn");

        const sections = document.querySelectorAll(".catering-section");

        panel.innerHTML = "";
        sections.forEach((sec) => {
          const title = sec.querySelector("h2")?.textContent || "Section";
          const id = sec.id;

          const b = document.createElement("button");
          b.textContent = title;
          b.onclick = () => {
            panel.classList.remove("active");

            const y =
              sec.getBoundingClientRect().top + window.pageYOffset - 120;

            window.scrollTo({
              top: y,
              behavior: "smooth",
            });
          };

          panel.appendChild(b);
        });

        btn.addEventListener("click", () => {
          panel.classList.toggle("active");
        });
      }
    </script>

    <!-- ⭐ CLOSE PANEL WHEN CLICKING OUTSIDE -->
    <script>
      document.addEventListener("click", function (e) {
        const panel = document.getElementById("jumpMenuPanel");
        const btn = document.getElementById("jumpMenuBtn");

        if (!panel.classList.contains("active")) return;

        if (btn.contains(e.target) || panel.contains(e.target)) return;

        panel.classList.remove("active");
      });
    </script>
  </body>
</html>
