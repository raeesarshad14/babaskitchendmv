<!-- Catering Modal -->
<div id="cateringModalOverlay" class="catering-modal-overlay">
  <div class="catering-modal">
    <h2 id="cateringModalTitle"></h2>

    <div class="qty-row">
      <button id="cateringQtyMinus" class="qty-btn">−</button>
      <span id="cateringQtyValue">12</span>
      <button id="cateringQtyPlus" class="qty-btn">+</button>
    </div>

    <p class="total-label">Total: <span id="cateringTotal">$0.00</span></p>

    <div class="modal-buttons">
      <button id="cateringAddToCart" class="add-btn">Add to Cart</button>
      <button id="cateringCloseModal" class="close-btn">Close</button>
    </div>
  </div>
</div>
