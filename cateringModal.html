<!-- Catering Modal -->
<div id="cateringModalOverlay" class="catering-modal-overlay">
  <div class="catering-modal">
    <h2 id="modalItemName"></h2>

    <!-- SMALL TRAY -->
    <div id="smallTrayRow" class="qty-row" style="display: none">
      <span>Small Tray ($<span id="smallPriceUnit"></span>)</span>
      <button class="qty-btn" onclick="changeQty('small', -1)">−</button>
      <span id="smallQty">0</span>
      <button class="qty-btn" onclick="changeQty('small', 1)">+</button>
      <span id="smallTotal">$0</span>
    </div>

    <!-- LARGE TRAY -->
    <div id="largeTrayRow" class="qty-row" style="display: none">
      <span>Large Tray ($<span id="largePriceUnit"></span>)</span>
      <button class="qty-btn" onclick="changeQty('large', -1)">−</button>
      <span id="largeQty">0</span>
      <button class="qty-btn" onclick="changeQty('large', 1)">+</button>
      <span id="largeTotal">$0</span>
    </div>

    <!-- SINGLE PRICE -->
    <div id="singleRow" class="qty-row" style="display: none">
      <button class="qty-btn" onclick="changeQty('single', -1)">−</button>
      <span id="singleQty">12</span>
      <button class="qty-btn" onclick="changeQty('single', 1)">+</button>
      <span id="singleTotal">$0</span>
    </div>

    <p class="total-label">Subtotal: <span id="modalSubtotal">$0</span></p>

    <div class="modal-buttons">
      <button id="modalAddBtn" class="add-btn">Add to Cart</button>
      <button onclick="closeModal()" class="close-btn">Close</button>
    </div>
  </div>
</div>
