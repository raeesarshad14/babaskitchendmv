<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout • Baba's Kitchen</title>

    <link rel="stylesheet" href="MainPage/MainPage.css" />
    <link rel="stylesheet" href="Checkout/checkout.css" />
  </head>

  <!-- ⭐ ADD THIS CLASS -->
  <body class="checkout-page-body">
    <!-- ⭐ DESKTOP HEADER (UNCHANGED) -->
    <header class="main-header">
      <div class="logo">
        <a href="index.html">
          <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html" class="cart-link">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
          <span id="cart-count">0</span>
        </a>
      </div>
    </header>

    <!-- ⭐ MOBILE HEADER (CHECKOUT ONLY — SAFE) -->
    <div class="mobile-header-checkout">
      <div class="mobile-header-top-checkout">
        <div class="mobile-logo-checkout">
          <a href="index.html">
            <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
          </a>
        </div>

        <div class="mobile-cart-icon-checkout">
          <a href="cart.html">
            <img src="Pictures/cartpicture/cart.png" alt="Cart" />
            <span id="cart-count-mobile-checkout">0</span>
          </a>
        </div>
      </div>

      <div class="mobile-menu-btn-checkout">MENU ☰</div>

      <div class="mobile-dropdown-checkout">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </div>
    </div>

    <!-- ⭐ CHECKOUT ROOT -->
    <div id="checkout-root"></div>

    <!-- ⭐ HIDDEN FORM -->
    <form
      id="checkoutOrderForm"
      action="https://api.web3forms.com/submit"
      method="POST"
      style="display: none"
    >
      <input
        type="hidden"
        name="access_key"
        value="cef0a8cc-1e43-4044-8caf-44f2bea00559"
      />
      <input type="hidden" id="form_from_name" name="from_name" />
      <input type="hidden" id="form_name" name="name" />
      <input type="hidden" id="form_phone" name="phone" />
      <input type="hidden" id="form_address" name="address" />
      <input type="hidden" id="form_payment" name="payment" />
      <input type="hidden" id="form_items" name="items" />
      <input type="hidden" id="form_subtotal" name="subtotal" />
      <input type="hidden" id="form_total" name="total" />
      <input
        type="hidden"
        name="redirect"
        value="https://babaskitchendmv.com/confirmation.html"
      />
    </form>

    <script src="Cart/cart.js"></script>
    <script src="Checkout/checkout.js"></script>

    <!-- ⭐ MOBILE MENU JS (CHECKOUT ONLY — SAFE) -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector(".mobile-menu-btn-checkout");
        const drop = document.querySelector(".mobile-dropdown-checkout");

        if (btn && drop) {
          btn.addEventListener("click", () => {
            drop.classList.toggle("active");
          });
        }

        // Sync mobile cart badge
        const mobileBadge = document.getElementById(
          "cart-count-mobile-checkout",
        );
        if (mobileBadge && typeof cart !== "undefined") {
          mobileBadge.textContent = cart.getCount();
        }
      });
    </script>
  </body>
</html>
