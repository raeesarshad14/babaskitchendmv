<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Baba's Kitchen</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />
    <link rel="stylesheet" href="MainPage/cart.css" />
    <link rel="stylesheet" href="MainPage/slider.css" />
    <link rel="stylesheet" href="MainPage/welcomeText.css" />

    <!-- NEW CART SYSTEM STYLES -->
    <link rel="stylesheet" href="Cart/cart.css" />
  </head>

  <!-- ⭐ ADD THIS CLASS -->
  <body class="main-page-body">
    <!-- ⭐ DESKTOP HEADER (UNCHANGED) -->
    <header class="main-header">
      <div class="logo">
        <a href="index.html">
          <img
            src="Pictures/MainPageLogo/logo picture.png"
            alt="BabaKitchen Logo"
          />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
        </a>
        <span id="cart-count">0</span>
      </div>
    </header>

    <!-- ⭐ MOBILE HEADER (MAIN PAGE ONLY — SAFE) -->
    <div class="mobile-header-main">
      <div class="mobile-header-top-main">
        <div class="mobile-logo-main">
          <a href="index.html">
            <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
          </a>
        </div>

        <div class="mobile-cart-icon-main">
          <a href="cart.html">
            <img src="Pictures/cartpicture/cart.png" alt="Cart" />
            <span id="cart-count-mobile-main">0</span>
          </a>
        </div>
      </div>

      <div class="mobile-menu-btn-main">MENU ☰</div>

      <div class="mobile-dropdown-main">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </div>
    </div>

    <!-- WELCOME TEXT -->
    <div class="welcome-rotator">
      <div class="welcome-text">
        <span>Welcome to Baba’s Kitchen! Offering Home Cooked Meals!</span>
      </div>
    </div>

    <!-- HERO SLIDER -->
    <section class="hero-slider">
      <div class="slides"></div>

      <div class="slider-arrow left-arrow">&#10094;</div>
      <div class="slider-arrow right-arrow">&#10095;</div>
    </section>

    <!-- JS FILES -->
    <script src="MainPage/slider.js" defer></script>
    <script src="MainPage/MainPage.js" defer></script>
    <script src="Cart/cart.js"></script>

    <!-- ⭐ MOBILE MENU JS (MAIN PAGE ONLY — SAFE) -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector(".mobile-menu-btn-main");
        const drop = document.querySelector(".mobile-dropdown-main");

        if (btn && drop) {
          btn.addEventListener("click", () => {
            drop.classList.toggle("active");
          });
        }

        // Sync mobile cart badge
        const mobileBadge = document.getElementById("cart-count-mobile-main");
        if (mobileBadge && typeof cart !== "undefined") {
          mobileBadge.textContent = cart.getCount();
        }
      });
    </script>
  </body>
</html>
