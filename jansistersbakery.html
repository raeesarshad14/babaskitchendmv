<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jan Sisters Bakery</title>

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />
    <link rel="stylesheet" href="JanSisters/JanSisters.css" />
    <link rel="stylesheet" href="Cart/cart.css" />
  </head>

  <body>
    <!-- ===========================
         GLOBAL HEADER
    ============================ -->
    <header class="main-header">
      <div class="logo">
        <a href="MainPage.html">
          <img
            src="Pictures/MainPageLogo/logo picture.png"
            alt="BabaKitchen Logo"
          />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
        </a>
        <span id="cart-count">0</span>
      </div>
    </header>

    <!-- ===========================
         HERO SECTION
    ============================ -->
    <section class="js-hero">
      <img
        src="Pictures/JanSisters/JanSisters.jpeg"
        class="js-logo"
        alt="Jan Sisters Bakery"
      />
      <h1 class="js-title">Jan Sisters Bakery</h1>

      <div class="js-arrow-hint">↓ Tap the button below</div>
      <a
        href="https://www.instagram.com/jansistersbakery"
        target="_blank"
        class="js-insta-btn"
      >
        <img src="Pictures/JanSisters/instagram.png" class="js-insta-icon" />
        Visit Our Instagram
      </a>

      <div class="js-floating-badge">✨ Follow @jansistersbakery</div>
    </section>

    <!-- ===========================
         MENU SECTION
    ============================ -->
    <section class="js-menu-section">
      <div class="js-special-badge">✨ This Week’s Specials ✨</div>
      <div id="js-menu-container"></div>
    </section>

    <!-- ===========================
         GALLERY SECTION
    ============================ -->
    <section class="js-gallery">
      <h2>Our Creations</h2>

      <div class="js-gallery-grid">
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert1.jpeg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert2.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert3.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert4.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert5.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert6.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert7.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert8.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert9.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert10.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert11.jpg" />
        </div>
        <div class="js-gallery-card">
          <img src="Pictures/JanSisters/dessert12.png" />
        </div>
      </div>
    </section>

    <!-- ===========================
         JAN SISTERS MODAL
    ============================ -->
    <div id="jsModal" class="js-modal">
      <div class="js-modal-content">
        <span class="js-close">&times;</span>

        <h2 id="jsModalTitle"></h2>

        <div class="js-modal-price">
          Price: $<span id="jsModalPrice"></span>
        </div>

        <div class="js-modal-qty">
          <button id="jsQtyMinus">-</button>
          <span id="jsQtyNumber">1</span>
          <button id="jsQtyPlus">+</button>
        </div>

        <div class="js-modal-total">
          Total: $<span id="jsModalTotal"></span>
        </div>

        <button id="jsAddToCartBtn" class="js-modal-add-btn">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- TOAST + SOUND -->
    <div id="toast"></div>
    <audio id="cartSound" src="Pictures/cartpicture/add.mp3"></audio>

    <!-- ===========================
         SCRIPTS (ORDER MATTERS)
    ============================ -->
    <script src="Cart/cart.js"></script>
    <script src="JanSisters/JanSisters.js"></script>
    <script src="JanSisters/JanSisterModel.js"></script>
  </body>
</html>
