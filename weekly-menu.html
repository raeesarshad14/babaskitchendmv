<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Menu • Baba's Kitchen</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="MainPage/MainPage.css" />
    <link rel="stylesheet" href="Cart/cart.css" />

    <!-- Weekly Menu Styles -->
    <link rel="stylesheet" href="Catering/WeeklyMenu/weekly-menu.css" />
  </head>

  <body>
    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Header -->
    <header class="main-header">
      <div class="logo">
        <a href="MainPage.html">
          <img src="Pictures/MainPageLogo/logo picture.png" alt="Logo" />
        </a>
      </div>

      <nav class="nav-links">
        <a href="catering.html">CATERING</a>
        <a href="dessert.html">DESSERTS</a>
        <a href="weekly-menu.html">WEEKLY MENU</a>
        <a href="contact-us.html">CONTACT US</a>
        <a href="jansistersbakery.html">JAN SISTERS BAKERY</a>
      </nav>

      <div class="cart-icon">
        <a href="cart.html">
          <img src="Pictures/cartpicture/cart.png" alt="Cart" />
        </a>
        <span id="cart-count">0</span>
      </div>
    </header>

    <!-- ⭐ PAGE LAYOUT (SIDEBAR + MENU) -->
    <div class="weekly-layout">
      <!-- ⭐ LEFT SIDEBAR (VERTICAL) -->
      <div class="weekly-sidebar">
        <button onclick="scrollToDay('Monday')">Monday</button>
        <button onclick="scrollToDay('Tuesday')">Tuesday</button>
        <button onclick="scrollToDay('Wednesday')">Wednesday</button>
        <button onclick="scrollToDay('Thursday')">Thursday</button>
        <button onclick="scrollToDay('Friday')">Friday</button>
        <button onclick="scrollToDay('Saturday')">Saturday</button>
        <button onclick="scrollToDay('Sunday')">Sunday</button>
      </div>

      <!-- ⭐ WEEKLY MENU CONTENT -->
      <div class="weekly-wrapper">
        <h1 class="weekly-title">Weekly Menu</h1>
        <div id="weekly-menu"></div>
      </div>
    </div>

    <!-- ⭐ WEEKLY MENU MODAL -->
    <div id="weeklyModal" class="weekly-modal-overlay">
      <div class="weekly-modal-box">
        <h2 id="wm-dish-name"></h2>

        <!-- ⭐ Quantity + Price Row -->
        <div class="wm-qty-price-row">
          <button onclick="wmDecrease()" class="wm-qty-btn">−</button>

          <span id="wm-qty" class="wm-qty-number">1</span>

          <button onclick="wmIncrease()" class="wm-qty-btn">+</button>

          <span id="wm-inline-price" class="wm-inline-price">$0</span>
        </div>

        <!-- ⭐ Subtotal -->
        <div class="wm-total-row">
          <span>Subtotal:</span>
          <span id="wm-total-price">$0</span>
        </div>

        <button class="wm-add-cart">Add to Cart</button>
        <button class="wm-close-btn" onclick="closeWeeklyModal()">Close</button>
      </div>
    </div>

    <!-- Scripts -->
    <script src="Cart/cart.js"></script>
    <script src="Catering/WeeklyMenu/weekly-menu.js"></script>
  </body>
</html>
